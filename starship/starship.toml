format = """
$directory $git_branch\
$fill\
$nodejs$rust$golang$php$bun$java$c$conda$zig$python $cmd_duration\
\n$character"""

add_newline = true

palette = "rose-pine"

[palettes.catppuccin-mocha]
red = "#f38ba8"
green = "#a6e3a1"
blue = "#89b4fa"
black = "#1e1e2e"
white = "#cdd6f4"
yellow = "#f9e2af"

[palettes.rose-pine]
red = "#eb6f92"
green = "#9ccfd8"
blue = "#31748f"
black = "#191724"
white = "#e0def4"
yellow = "#f6c177"

[fill]
symbol = ' '

[character]
success_symbol = "[󱞩](green)"
error_symbol = "[󱞩](red)"

[directory]
format = "[$path](bold blue)"
truncation_length = 1
truncation_symbol = "../"
truncate_to_repo = true

[cmd_duration]
format = "took [ $duration]($style)"
style = "bold fg:white"
min_time = 500

[git_branch]
format = "-> [$symbol$branch](bold green) "
symbol = " "

[git_status]
format = '[$all_status$ahead_behind ]($style)'
style = "fg:white bg:git"

[docker_context]
disabled = true
symbol = " "

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}(${version})( \($virtualenv\))](yellow)'
symbol = " "
version_format = "${raw}"

[java]
format = '[$symbol$version](red)'
version_format = "${raw}"
symbol = " "

[c]
format = '[[ $symbol ($version) ](fg:#7FB4CA)]($style)'
symbol = " "
version_format = "${raw}"
disabled = false

[zig]
format = '[[ $symbol ($version) ](fg:#FFA066)]($style)'
version_format = "${raw}"
disabled = false

[bun]
version_format = "${raw}"
format = '[[ $symbol ($version) ](fg:#DCD7BA)]($style)'
disabled = false

[nodejs]
symbol = " "
format = '[$symbol($version)](green)'
version_format = "${raw}"

[rust]
symbol = ""
format = '[[ $symbol ($version) ](fg:#FF5D62)]($style)'

[golang]
symbol = ""
format = '[[ $symbol ($version) ](fg:#7FB4CA)]($style)'

[php]
symbol = ""
format = '[[ $symbol ($version) ](fg:#FF9E3B)]($style)'
