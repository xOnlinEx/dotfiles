[mgr]
marker_copied = { fg = "#87a987", bg = "#87a987" }
marker_cut = { fg = "#e46876", bg = "#e46876" }
marker_marked = { fg = "#a292a3", bg = "#a292a3" }
marker_selected = { fg = "#c4b28a", bg = "#c4b28a" }
cwd = { fg = "#e6c384" }
find_keyword = { fg = "#c4b28a", bg = "#090E13" }
find_position = {}
count_copied = { fg = "#090E13", bg = "#87a987" }
count_cut = { fg = "#090E13", bg = "#e46876" }
count_selected = { fg = "#090E13", bg = "#c4b28a" }
border_symbol = "│"
border_style = { fg = "#c5c9c7" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { reversed = true }

[tabs]
active = { fg = "#090E13", bg = "#8ba4b0" }
inactive = { fg = "#8ba4b0", bg = "#24262D" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#090E13", bg = "#8ba4b0" }
normal_alt = { fg = "#8ba4b0", bg = "#24262D" }
select_main = { fg = "#090E13", bg = "#a292a3" }
select_alt = { fg = "#a292a3", bg = "#24262D" }
unset_main = { fg = "#090E13", bg = "#e6c384" }
unset_alt = { fg = "#e6c384", bg = "#24262D" }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall = { fg = "#c8c093", bg = "#090E13" }
progress_label = { fg = "#8ba4b0", bold = true }
progress_normal = { fg = "#24262D", bg = "#090E13" }
progress_error = { fg = "#24262D", bg = "#090E13" }
perm_type = { fg = "#87a987" }
perm_read = { fg = "#e6c384" }
perm_write = { fg = "#e46876" }
perm_exec = { fg = "#7aa89f" }
perm_sep = { fg = "#a292a3" }

[pick]
border = { fg = "#7fb4ca" }
active = { fg = "#a292a3", bold = true }
inactive = {}

[input]
border = { fg = "#7fb4ca" }
title = {}
value = {}
selected = { reversed = true }

[completion]
border = { fg = "#7fb4ca" }
active = { reversed = true }
inactive = {}

[tasks]
border = { fg = "#7fb4ca" }
title = {}
hovered = { fg = "#a292a3" }

[which]
cols = 2
separator = " - "
separator_style = { fg = "#a4a7a4" }
mask = { bg = "#090E13" }
rest = { fg = "#a4a7a4" }
cand = { fg = "#8ba4b0" }
desc = { fg = "#24262D" }

[help]
on = { fg = "#7aa89f" }
run = { fg = "#a292a3" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "#090E13", bg = "#c5c9c7" }

[notify]
title_info = { fg = "#87a987" }
title_warn = { fg = "#e6c384" }
title_error = { fg = "#e46876" }

[filetype]
rules = [
    # images
    { mime = "image/*", fg = "#e6c384" },
    # media
    { mime = "{audio,video}/*", fg = "#a292a3" },
    # archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#e46876" },
    # documents
    { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#8ea4a2" },
    # broken links
    { url = "*", is = "orphan", fg = "#c4746e" },
    # executables
    { url = "*", is = "exec", fg = "#8a9a7b" },
    # fallback
    { url = "*", fg = "#c5c9c7" },
    { url = "*/", fg = "#8ba4b0" },
]
